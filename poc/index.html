<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>טיול של מארק · ניווט שטח</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root{
      --bg:#eef0ec; --panel:rgba(255,255,255,0.82); --panel-blur:blur(14px) saturate(1.3);
      --text:#23201c; --muted:#6b6256; --accent:#d06a24; --accent-2:#3f7d55;
      --shadow:0 8px 28px rgba(40,32,20,0.22); --radius:18px; --edge:rgba(255,255,255,0.55);
    }
    [data-theme="night"]{ --bg:#14171a; --panel:rgba(26,30,33,0.80); --text:#eef1ee; --muted:#9aa0a2; --shadow:0 8px 28px rgba(0,0,0,0.55); --edge:rgba(255,255,255,0.10); }
    *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html,body{ margin:0; height:100%; font-family:"Segoe UI","Heebo",system-ui,sans-serif; }
    #map{ position:absolute; inset:0; background:var(--bg); }
    .leaflet-container{ font-family:inherit; background:var(--bg); }
    .panel,.brand,.icon-btn,.tool-dock,.layers,.legend,.credits,.chip,.hint,.showme-fab,.modal,.trip-bar,.chat-panel,.poi-status,.lang-menu,.search-bar{
      background:var(--panel); backdrop-filter:var(--panel-blur); border:1px solid var(--edge); box-shadow:var(--shadow); color:var(--text);
    }
    .topbar{ position:absolute; top:14px; right:14px; left:14px; z-index:600; display:flex; align-items:flex-start; justify-content:space-between; pointer-events:none; }
    .brand{ pointer-events:auto; display:flex; align-items:center; gap:10px; padding:9px 15px; border-radius:var(--radius); font-weight:700; font-size:15px; }
    .brand .logo{ width:29px; height:29px; border-radius:9px; background:linear-gradient(135deg,var(--accent),var(--accent-2)); display:grid; place-items:center; color:#fff; font-size:16px; }
    .brand small{ font-weight:500; color:var(--muted); font-size:11px; }
    .top-actions{ pointer-events:auto; display:flex; gap:7px; flex-wrap:wrap; justify-content:flex-end; max-width:66%; }
    .icon-btn{ width:44px; height:44px; border:none; cursor:pointer; border-radius:13px; font-size:19px; display:grid; place-items:center; color:var(--text); transition:transform .12s, background .2s; }
    .icon-btn:active{ transform:scale(.93); }
    .icon-btn.active{ background:linear-gradient(135deg,var(--accent),var(--accent-2)); color:#fff; }

    .lang-menu{ position:absolute; top:66px; left:14px; z-index:700; display:none; flex-direction:column; gap:2px; padding:6px; border-radius:14px; }
    .lang-menu.open{ display:flex; }
    .lang-menu button{ border:none; background:transparent; color:var(--text); font-size:14px; font-family:inherit; text-align:start; padding:9px 14px; border-radius:10px; cursor:pointer; white-space:nowrap; }
    .lang-menu button.sel{ background:var(--accent); color:#fff; }

    .search-bar{ position:absolute; top:12px; left:12px; right:12px; z-index:700; display:none; flex-direction:column; border-radius:16px; overflow:hidden; }
    .search-bar.open{ display:flex; }
    .search-row{ display:flex; align-items:center; gap:8px; padding:6px 8px 6px 12px; }
    .search-row input{ flex:1; border:none; background:transparent; color:var(--text); font-size:15px; font-family:inherit; outline:none; padding:8px 4px; }
    .search-row button{ border:none; background:rgba(128,128,128,.16); color:var(--text); width:34px; height:34px; border-radius:10px; cursor:pointer; }
    .search-results{ display:flex; flex-direction:column; max-height:52vh; overflow:auto; }
    .search-results .res{ text-align:start; padding:10px 14px; border:none; border-top:1px solid rgba(128,128,128,.15); cursor:pointer; font-size:13.5px; color:var(--text); background:transparent; font-family:inherit; }
    .search-results .res small{ display:block; color:var(--muted); font-size:11.5px; margin-top:2px; }

    .info-stack{ position:absolute; top:70px; left:50%; transform:translateX(-50%); z-index:500; display:flex; flex-direction:column; align-items:center; gap:8px; max-width:92vw; pointer-events:none; }
    .info-stack>*{ pointer-events:auto; }
    .hint{ padding:7px 14px; border-radius:14px; color:var(--muted); font-size:12.5px; font-weight:600; }
    .chip{ display:none; align-items:center; gap:8px; padding:8px 8px 8px 14px; border-radius:14px; font-weight:700; font-size:13px; border-right:4px solid var(--accent); }
    .chip-x{ border:none; background:rgba(128,128,128,.16); color:var(--text); border-radius:9px; width:26px; height:26px; cursor:pointer; font-size:13px; flex:0 0 26px; }
    .chip-x.del{ background:rgba(210,59,59,.16); }
    .route-chip{ border-right-color:#c2682a; } .nav-chip{ border-right-color:#2e9e3f; } .measure-chip{ border-right-color:#1f6fd1; } .track-chip{ border-right-color:#8e44ad; }
    .poi-status{ position:absolute; bottom:78px; left:50%; transform:translateX(-50%); z-index:500; display:none; padding:5px 12px; border-radius:12px; color:var(--muted); font-size:12px; font-weight:600; }

    .tool-dock{ position:absolute; top:132px; right:14px; z-index:500; display:flex; flex-direction:column; gap:6px; padding:8px; border-radius:20px; }
    .tool-btn{ width:44px; height:44px; border:none; cursor:pointer; background:transparent; color:var(--text); border-radius:13px; font-size:19px; display:grid; place-items:center; transition:transform .12s, background .2s; }
    .tool-btn:active{ transform:scale(.92); }
    .tool-btn.on{ background:linear-gradient(135deg,var(--accent),var(--accent-2)); color:#fff; }

    .showme-fab{ position:absolute; right:16px; z-index:500; bottom:70px; display:flex; align-items:center; gap:8px; border:none; cursor:pointer; padding:11px 16px; border-radius:26px; font-family:inherit; font-weight:700; font-size:14px; }
    .showme-fab .ic{ font-size:17px; } .showme-fab.on{ background:linear-gradient(135deg,var(--accent),var(--accent-2)); color:#fff; }
    .rec-fab{ bottom:122px; } .rec-fab.on{ background:linear-gradient(135deg,#e53935,#b71c1c); color:#fff; animation:recPulse 1.4s infinite; }
    @keyframes recPulse{ 0%,100%{box-shadow:var(--shadow)} 50%{box-shadow:0 0 0 7px rgba(229,57,53,.28)} }

    .layers{ position:absolute; bottom:14px; left:14px; z-index:500; border-radius:var(--radius); padding:8px; display:flex; flex-direction:column; gap:5px; max-height:calc(100vh - 120px); overflow:auto; }
    .layer-chip{ border:none; cursor:pointer; text-align:start; background:transparent; color:var(--text); padding:8px 13px; border-radius:11px; font-size:13.5px; font-weight:600; display:flex; align-items:center; gap:9px; }
    .layer-chip.active{ background:var(--accent); color:#fff; }
    .layer-chip .dot{ font-size:15px; }
    .lhdr{ font-size:11px; font-weight:800; color:var(--muted); padding:3px 10px 2px; }
    .ldiv{ height:1px; background:rgba(128,128,128,.25); margin:4px 6px; }

    .north{ position:absolute; top:132px; left:14px; z-index:500; width:46px; height:46px; border-radius:50%; display:grid; place-items:center; }
    .north .arr{ color:#d23b3b; font-size:20px; line-height:1; } .north .lbl{ position:absolute; bottom:3px; font-size:9px; font-weight:800; color:var(--muted); }

    .credits{ position:absolute; bottom:14px; right:14px; z-index:500; border-radius:14px; max-width:300px; overflow:hidden; }
    .credits summary{ cursor:pointer; padding:9px 13px; font-size:12.5px; font-weight:600; list-style:none; }
    .credits .body{ padding:0 13px 11px; font-size:11.5px; color:var(--muted); line-height:1.6; }
    .credits a{ color:var(--accent); text-decoration:none; }

    .me-dot{ width:20px; height:20px; position:relative; }
    .me-dot .c{ position:absolute; inset:5px; background:#1f6fd1; border:2px solid #fff; border-radius:50%; }
    .me-dot .p{ position:absolute; inset:0; border-radius:50%; background:rgba(31,111,209,.35); animation:mePulse 2s infinite; }
    @keyframes mePulse{ 0%{transform:scale(.5);opacity:.85} 100%{transform:scale(2.3);opacity:0} }
    .emoji-icon{ font-size:22px; filter:drop-shadow(0 2px 4px rgba(0,0,0,.45)); text-align:center; line-height:1; }
    .member-dot{ width:34px;height:34px;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.35);display:grid;place-items:center;font-size:17px;color:#fff; }
    .member-dot .nm{ position:absolute; top:34px; font-size:10px; font-weight:800; background:rgba(0,0,0,.6); color:#fff; padding:1px 5px; border-radius:6px; white-space:nowrap; }

    .leaflet-popup-content{ direction:rtl; text-align:start; font-family:inherit; margin:12px 14px; }
    .poi-pop b{ display:block; font-size:14px; margin-bottom:2px; } .poi-pop span{ font-size:12px; color:#6b6256; } .poi-pop a{ color:var(--accent); font-size:11.5px; }
    .poi-pop img{ width:100%; max-width:210px; border-radius:8px; margin-bottom:6px; display:block; }
    .poi-route-btn,.nav-here,.copy-coord{ border:none; color:#fff; border-radius:8px; padding:6px 10px; margin-top:8px; cursor:pointer; font-family:inherit; font-weight:700; font-size:12px; background:var(--accent); }
    .nav-here{ background:var(--accent-2); }

    /* מודאלים */
    .modal-backdrop{ position:absolute; inset:0; z-index:900; background:rgba(20,18,15,.45); display:none; align-items:center; justify-content:center; backdrop-filter:blur(3px); }
    .modal-backdrop.open{ display:flex; }
    .modal{ width:min(380px,92vw); max-height:90vh; overflow:auto; border-radius:var(--radius); padding:22px; direction:rtl; }
    .modal h3{ margin:0 0 4px; font-size:19px; } .modal p.sub{ margin:0 0 14px; font-size:13px; color:var(--muted); }
    .modal label{ display:block; font-size:12px; font-weight:700; margin:10px 0 4px; color:var(--muted); }
    .modal input{ width:100%; padding:11px 13px; border:1px solid rgba(128,128,128,.3); border-radius:11px; background:transparent; color:var(--text); font-size:14px; font-family:inherit; }
    .modal .btn{ width:100%; margin-top:14px; padding:12px; border:none; border-radius:12px; cursor:pointer; background:var(--accent); color:#fff; font-size:15px; font-weight:700; font-family:inherit; }
    .modal .btn.ghost{ background:transparent; color:var(--accent); margin-top:6px; } .modal .msg{ margin-top:12px; font-size:13px; min-height:18px; }
    .modal .msg.err{ color:#d23b3b; } .modal .msg.ok{ color:var(--accent-2); } .modal .close{ float:left; cursor:pointer; color:var(--muted); font-size:20px; border:none; background:none; }
    .ava-colors,.ava-icons{ display:flex; flex-wrap:wrap; gap:8px; margin-top:4px; }
    .ava-colors span{ width:30px; height:30px; border-radius:50%; cursor:pointer; border:3px solid transparent; } .ava-colors span.sel{ border-color:var(--text); }
    .ava-icons span{ width:40px; height:40px; border-radius:11px; display:grid; place-items:center; cursor:pointer; font-size:21px; background:rgba(128,128,128,.12); border:2px solid transparent; } .ava-icons span.sel{ border-color:var(--accent); }
    .ava-preview{ display:flex; align-items:center; gap:10px; margin:14px 0 4px; } .ava-preview .av-big{ width:48px; height:48px; border-radius:50%; display:grid; place-items:center; color:#fff; font-size:24px; }
    .trips-list{ margin-top:14px; display:flex; flex-direction:column; gap:8px; }
    .trip-row{ display:flex; align-items:center; gap:8px; padding:10px 12px; border-radius:12px; background:rgba(128,128,128,.1); }
    .trip-row .nm{ flex:1; font-weight:700; font-size:14px; } .trip-row button{ border:none; background:var(--accent); color:#fff; border-radius:9px; padding:7px 10px; cursor:pointer; font-size:12px; font-weight:700; font-family:inherit; } .trip-row button.ghost{ background:transparent; color:var(--accent); }
    .trip-bar{ position:absolute; bottom:14px; left:50%; transform:translateX(-50%); z-index:600; display:none; align-items:center; gap:8px; padding:8px 10px; border-radius:14px; }
    .trip-bar .tb-name{ font-weight:700; font-size:13px; padding:0 6px; max-width:150px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .tb-btn{ border:none; background:rgba(128,128,128,.14); color:var(--text); border-radius:10px; padding:8px 11px; cursor:pointer; font-size:13px; font-weight:700; font-family:inherit; } .tb-btn.on{ background:var(--accent-2); color:#fff; }
    .chat-panel{ position:absolute; top:0; bottom:0; left:0; z-index:800; width:min(340px,86vw); display:none; flex-direction:column; }
    .chat-head{ display:flex; align-items:center; justify-content:space-between; padding:14px 16px; border-bottom:1px solid rgba(128,128,128,.2); font-weight:700; } .chat-head button{ border:none; background:none; cursor:pointer; font-size:18px; color:var(--muted); }
    .chat-msgs{ flex:1; overflow:auto; padding:12px 14px; display:flex; flex-direction:column; gap:8px; }
    .chat-msg{ max-width:80%; padding:8px 11px; border-radius:12px; font-size:13px; background:rgba(128,128,128,.14); align-self:flex-start; } .chat-msg.mine{ align-self:flex-end; background:var(--accent); color:#fff; } .chat-msg .who{ display:block; font-size:10px; opacity:.7; margin-bottom:2px; }
    .chat-input{ display:flex; gap:8px; padding:12px 14px; border-top:1px solid rgba(128,128,128,.2); } .chat-input input{ flex:1; padding:10px 12px; border:1px solid rgba(128,128,128,.3); border-radius:11px; background:transparent; color:var(--text); font-family:inherit; } .chat-input button{ border:none; background:var(--accent); color:#fff; border-radius:11px; padding:0 16px; cursor:pointer; font-weight:700; font-family:inherit; }

    /* הדפסה */
    #printHeader{ display:none; }
    @media print{
      .topbar,.tool-dock,.showme-fab,.layers,.credits,.poi-status,.info-stack,.trip-bar,.chat-panel,.lang-menu,.search-bar,.north,.leaflet-control-zoom{ display:none !important; }
      #printHeader{ display:block; position:fixed; top:0; left:0; right:0; z-index:2000; background:#fff; color:#111; padding:6px 12px; font-size:13px; border-bottom:2px solid #333; }
      #printHeader .pn{ float:left; font-weight:800; } #map{ top:52px !important; }
      .leaflet-control-scale{ display:block !important; }
    }
  </style>
</head>
<body data-theme="day">
  <div id="map"></div>
  <div id="printHeader"></div>

  <div class="topbar">
    <div class="brand"><div class="logo">🧭</div><div><span id="brandName">טיול של מארק</span> <small id="brandTag">· ניווט שטח</small></div></div>
    <div class="top-actions">
      <button class="icon-btn" id="searchBtn" title="חיפוש מקום">🔎</button>
      <button class="icon-btn" id="accountBtn" title="חשבון / הרשמה">👤</button>
      <button class="icon-btn" id="tripsBtn" title="טיולים קבוצתיים">👥</button>
      <button class="icon-btn" id="poiBtn" title="נקודות עניין">🏞️</button>
      <button class="icon-btn" id="photoBtn" title="צלם / צרף תמונה">📷</button>
      <button class="icon-btn" id="importRouteBtn" title="ייבוא מסלול (GPX/KML)">📂</button>
      <button class="icon-btn" id="printBtn" title="הדפסת מסלול">🖨️</button>
      <button class="icon-btn" id="themeBtn" title="יום / לילה">🌙</button>
      <button class="icon-btn" id="langBtn" title="Language / שפה">🌐</button>
      <input type="file" accept="image/*" capture="environment" id="photoInput" style="display:none" />
      <input type="file" accept=".gpx,.kml,text/xml" id="routeInput" style="display:none" />
    </div>
  </div>

  <div class="lang-menu" id="langMenu">
    <button data-lang="he">🇮🇱 עברית</button><button data-lang="en">🇬🇧 English</button>
    <button data-lang="fr">🇫🇷 Français</button><button data-lang="es">🇪🇸 Español</button><button data-lang="ru">🇷🇺 Русский</button>
  </div>

  <div class="search-bar" id="searchBar">
    <div class="search-row"><span style="font-size:16px">🔎</span><input id="searchInput" type="text" placeholder="חיפוש מקום…" autocomplete="off" /><button id="searchClose">✕</button></div>
    <div class="search-results" id="searchResults"></div>
  </div>

  <div class="info-stack">
    <div class="hint" id="hint">👆 הקישו על המפה ליעד ← מסלול שטח · 🔎 חיפוש · 🏞️ נקודות עניין</div>
    <div class="chip route-chip" id="routeInfo"><span></span><button class="chip-x" id="shareRouteBtn" title="שתף">🔗</button><button class="chip-x" id="routeGpxBtn" title="GPX">⬇️</button><button class="chip-x del" id="clearRouteBtn">✕</button></div>
    <div class="chip nav-chip" id="navInfo"><span></span><button class="chip-x" id="cancelNavBtn">✕</button></div>
    <div class="chip measure-chip" id="measureInfo"><span></span><button class="chip-x" id="undoMeasureBtn">↶</button><button class="chip-x del" id="clearMeasureBtn">🗑️</button></div>
    <div class="chip track-chip" id="trackInfo"><span></span><button class="chip-x" id="trackGpxBtn">⬇️</button><button class="chip-x" id="trackSaveBtn">💾</button><button class="chip-x del" id="trackClearBtn">🗑️</button></div>
  </div>
  <div class="poi-status" id="poiStatus"></div>

  <div class="north" title="צפון"><div class="arr">▲</div><div class="lbl">צ</div></div>

  <div class="tool-dock">
    <button class="tool-btn" data-tool="bearing" title="נווט ליעד — קרן אווירית">🎯</button>
    <button class="tool-btn" data-tool="route" title="מסלול שטח ליעד">🚙</button>
    <button class="tool-btn" data-tool="distance" title="מדידת מרחק">📏</button>
    <button class="tool-btn" data-tool="area" title="מדידת שטח">⬛</button>
    <button class="tool-btn" data-tool="point" title="סמן נקודה + קואורדינטות">📌</button>
  </div>

  <button class="showme-fab" id="showMeBtn" title="הצג אותי"><span class="ic">📍</span><span class="tx">הצג אותי</span></button>
  <button class="showme-fab rec-fab" id="recBtn" title="הקלטת מסלול"><span class="ic">🔴</span><span class="tx">הקלט מסלול</span></button>

  <div class="layers" id="layers"></div>

  <details class="credits"><summary>ℹ️ מקורות וקרדיטים</summary><div class="body" id="creditsBody"></div></details>

  <!-- מודאל חשבון -->
  <div class="modal-backdrop" id="acctModal"><div class="modal">
    <button class="close" id="acctClose">✕</button>
    <div id="authView">
      <h3 id="acc_welcome">ברוכים הבאים 🧭</h3><p class="sub" id="acc_sub">התחברו או הירשמו כדי ליצור טיולים</p>
      <label id="acc_email_l">אימייל</label><input type="email" id="authEmail" autocomplete="email" />
      <label id="acc_pass_l">סיסמה</label><input type="password" id="authPass" autocomplete="current-password" />
      <button class="btn" id="loginBtn">התחברות</button><button class="btn ghost" id="signupBtn">הרשמה למשתמש חדש</button>
      <div class="msg" id="authMsg"></div>
    </div>
    <div id="profileView" style="display:none">
      <h3 id="acc_profile">הפרופיל שלי</h3><p class="sub" id="profileEmail"></p>
      <label id="acc_dispname">שם תצוגה</label><input type="text" id="dispName" />
      <div class="ava-preview"><div class="av-big" id="avBig">🚙</div></div>
      <label id="acc_color">צבע</label><div class="ava-colors" id="avaColors"></div>
      <label id="acc_icon">אייקון</label><div class="ava-icons" id="avaIcons"></div>
      <button class="btn" id="saveProfileBtn">שמירה</button><button class="btn ghost" id="logoutBtn">התנתקות</button>
      <div class="msg" id="profMsg"></div>
    </div>
  </div></div>

  <!-- מודאל טיולים -->
  <div class="modal-backdrop" id="tripsModal"><div class="modal">
    <button class="close" id="tripsClose">✕</button>
    <h3 id="trips_title">טיולים קבוצתיים 👥</h3><p class="sub" id="trips_sub">צרו טיול, הזמינו חברים, ונווטו יחד</p>
    <div id="tripsLoginNote" class="msg" style="display:none">התחברו תחילה (👤).</div>
    <div id="tripsBody">
      <label id="trips_newname">שם טיול חדש</label><input type="text" id="newTripName" />
      <button class="btn" id="createTripBtn">צור טיול</button>
      <div class="trips-list" id="tripsList"></div><div class="msg" id="tripsMsg"></div>
    </div>
  </div></div>

  <!-- סרגל טיול + צ'אט -->
  <div class="trip-bar" id="tripBar"><span class="tb-name" id="tbName"></span><button class="tb-btn" id="locShareBtn">📡 מיקום</button><button class="tb-btn" id="chatToggleBtn">💬 צ'אט</button><button class="tb-btn" id="leaveTripBtn">✕</button></div>
  <div class="chat-panel" id="chatPanel"><div class="chat-head"><span id="chatTitle">צ'אט</span><button id="chatClose">✕</button></div><div class="chat-msgs" id="chatMsgs"></div><div class="chat-input"><input id="chatText" placeholder="הודעה…" /><button id="chatSend">שלח</button></div></div>

  <script>
  // ================== מצב + i18n ==================

  // עזרי גאומטריה
  const toRad=d=>d*Math.PI/180;
  function emojiIcon(e,s){ s=s||24; return L.divIcon({ html:'<div class="emoji-icon" style="font-size:'+s+'px">'+e+'</div>', className:'', iconSize:[s,s], iconAnchor:[s/2,s] }); }
  function haversine(a,b){ return map.distance([a[1],a[0]],[b[1],b[0]]); } // a,b = [lng,lat]
  function bearingDeg(a,b){ const y=Math.sin(toRad(b[0]-a[0]))*Math.cos(toRad(b[1])); const x=Math.cos(toRad(a[1]))*Math.sin(toRad(b[1]))-Math.sin(toRad(a[1]))*Math.cos(toRad(b[1]))*Math.cos(toRad(b[0]-a[0])); return (Math.atan2(y,x)*180/Math.PI+360)%360; }

  // ================== R2 מסלול (BRouter) ==================

  async function routeTo(start,dest){
    chip('routeInfo','מחשב מסלול…',true);
    const url='https://brouter.de/brouter?lonlats='+start[0].toFixed(5)+','+start[1].toFixed(5)+'|'+dest[0].toFixed(5)+','+dest[1].toFixed(5)+'&profile='+routeProfile+'&alternativeidx=0&format=geojson';
    try{
      const j=await (await fetch(url)).json();
      if(!j.features||!j.features.length){ chip('routeInfo','לא נמצא מסלול',true); return; }
      const co=j.features[0].geometry.coordinates; drawRoute(co);
      const km=(j.features[0].properties['track-length']/1000).toFixed(1);
      chip('routeInfo','מסלול שטח · '+km+' ק"מ',true);
      map.fitBounds(routeLayer.getBounds(),{padding:[50,50],maxZoom:15});
    }catch(e){ chip('routeInfo','שגיאה בחישוב מסלול',true); }
  }

  function setDestination(ll){ // ll=[lng,lat] — נתיב מנקודת ההתחלה/מיקום GPS ליעד

  }

  // ================== R6 GPX ==================
  function routeGPX(){ const seg=lastRouteCoords.map(p=>'<trkpt lat="'+p[1]+'" lon="'+p[0]+'"></trkpt>').join(''); return '<?xml version="1.0"?>\n<gpx version="1.1" creator="field-nav-app" xmlns="http://www.topografix.com/GPX/1/1"><trk><name>מסלול</name><trkseg>'+seg+'</trkseg></trk></gpx>'; }

  // ================== R3 נקודות עניין (Overpass) ==================
  const POI_DEFS=[
    {k:'natural=spring',icon:'💧',label:'מעיין',grp:'water'},{k:'natural=hot_spring',icon:'♨️',label:'מעיין חם',grp:'water'},{k:'waterway=waterfall',icon:'🌊',label:'מפל',grp:'water'},
    {k:'natural=cave_entrance',icon:'🕳️',label:'מערה',grp:'nature'},{k:'natural=peak',icon:'⛰️',label:'פסגה',grp:'nature'},{k:'natural=beach',icon:'🏖️',label:'חוף',grp:'nature'},{k:'tourism=viewpoint',icon:'🔭',label:'תצפית',grp:'nature'},
    {k:'historic=archaeological_site',icon:'🏛️',label:'עתיקות',grp:'heritage'},{k:'historic=ruins',icon:'🏚️',label:'חורבה',grp:'heritage'},{k:'historic=castle',icon:'🏰',label:'מצודה',grp:'heritage'},{k:'historic=fort',icon:'🏯',label:'מבצר',grp:'heritage'},{k:'historic=memorial',icon:'🗿',label:'אנדרטה',grp:'heritage'},{k:'historic=tomb',icon:'🪦',label:'קבר עתיק',grp:'heritage'},{k:'building=monastery',icon:'⛪',label:'מנזר',grp:'heritage'},{k:'historic=monastery',icon:'⛪',label:'מנזר',grp:'heritage'},
    {k:'tourism=attraction',icon:'⭐',label:'אתר מושך',grp:'tour'},{k:'tourism=camp_site',icon:'⛺',label:'חניון לילה',grp:'tour'},{k:'tourism=wilderness_hut',icon:'🛖',label:'בקתת שטח',grp:'tour'}
  ];
  const OVERPASS=['https://overpass.kumi.systems/api/interpreter','https://overpass.private.coffee/api/interpreter','https://overpass-api.de/api/interpreter'];
  let poiOn=false, poiLayer=L.layerGroup(), activeGroups=new Set(['water','nature','heritage','tour']), poiTimer=null, lastPoiKey='';
  poiLayer.addTo(map);
  function schedulePois(){ if(!poiOn)return; clearTimeout(poiTimer); poiTimer=setTimeout(loadPois,1000); }
  async function loadPois(force){
    if(!poiOn)return;
    if(scaleDenom()>500000){ setPoiStatus('התקרבו (זום) כדי לראות נקודות עניין'); return; }
    const defs=POI_DEFS.filter(d=>activeGroups.has(d.grp));
    if(!defs.length){ poiLayer.clearLayers(); setPoiStatus('בחרו קטגוריות'); return; }
    const b=map.getBounds().pad(0.2);   // המרובע הנצפה + באפר 20%
    const key=b.getSouth().toFixed(3)+b.getWest().toFixed(3)+Math.round(map.getZoom());
    if(!force && key===lastPoiKey) return;
    const bbox=b.getSouth().toFixed(4)+','+b.getWest().toFixed(4)+','+b.getNorth().toFixed(4)+','+b.getEast().toFixed(4);
    // איחוד קטגוריות לפי מפתח OSM לשאילתת regex קצרה (URL קצר, מהיר, לא נדחה)
    const byKey={}; defs.forEach(d=>{ const [k,v]=d.k.split('='); (byKey[k]=byKey[k]||[]).push(v); });
    const clauses=Object.keys(byKey).map(k=>'nwr["'+k+'"~"^('+byKey[k].join('|')+')$"]('+bbox+');').join('');
    const q='[out:json][timeout:25];('+clauses+');out center 60;';
    setPoiStatus('טוען נקודות עניין…');

        const ac=new AbortController(); const to=setTimeout(()=>ac.abort(),18000);

        if(!r.ok) continue;
        const j=JSON.parse(await r.text()); lastPoiKey=key; renderPois(j.elements||[]); return;
      }catch(e){}
    }
    setPoiStatus('שרת עמוס — לחצו 🏞️ לניסיון חוזר');
  }
  function renderPois(els){
    poiLayer.clearLayers(); let n=0;
    els.forEach(el=>{
      const lat=el.lat!=null?el.lat:(el.center&&el.center.lat), lng=el.lon!=null?el.lon:(el.center&&el.center.lon);
      if(lat==null)return; const tags=el.tags||{}; let def=null;

  function demTile(x,y,z){ return new Promise((res,rej)=>{ const im=new Image(); im.crossOrigin='anonymous'; im.onload=()=>res({im,x,y}); im.onerror=()=>rej(new Error('t')); im.src='https://s3.amazonaws.com/elevation-tiles-prod/terrarium/'+z+'/'+x+'/'+y+'.png'; }); }
  async function loadContours(){
    if(!contoursOn)return;
    if(scaleDenom()>600000){ contourLayer.clearLayers(); setPoiStatus('התקרבו כדי לראות קווי גובה'); return; }
    if(contourBusy)return; contourBusy=true;
    try{
      if(!d3c){ d3c=(await import('https://esm.sh/d3-contour@4')).contours; }
      const z=Math.min(Math.max(Math.round(map.getZoom())-1,10),12);
      const b=map.getBounds().pad(0.1);
      const nw=map.project(b.getNorthWest(),z), se=map.project(b.getSouthEast(),z);
      const tx0=Math.floor(nw.x/256),tx1=Math.floor(se.x/256),ty0=Math.floor(nw.y/256),ty1=Math.floor(se.y/256);
      if((tx1-tx0+1)*(ty1-ty0+1)>20){ contourBusy=false; return; }
      const W=(tx1-tx0+1)*256,H=(ty1-ty0+1)*256;
      const cv=document.createElement('canvas'); cv.width=W; cv.height=H; const ctx=cv.getContext('2d',{willReadFrequently:true});
      const loaded=await Promise.all((function(){const a=[];for(let x=tx0;x<=tx1;x++)for(let y=ty0;y<=ty1;y++)a.push(demTile(x,y,z).catch(()=>null));return a;})());
      loaded.forEach(t=>{ if(t)ctx.drawImage(t.im,(t.x-tx0)*256,(t.y-ty0)*256); });
      const data=ctx.getImageData(0,0,W,H).data, grid=new Float32Array(W*H); let mn=Infinity,mx=-Infinity;
      for(let i=0;i<W*H;i++){ const v=(data[i*4]*256+data[i*4+1]+data[i*4+2]/256)-32768; grid[i]=v; if(v>-400&&v<9000){if(v<mn)mn=v;if(v>mx)mx=v;} }
      if(!isFinite(mn)){ contourBusy=false; return; }

      for(let e=Math.ceil(mn/interval)*interval;e<=mx;e+=interval){ thrs.push(e); if(thrs.length>80)break; }
      const polys=d3c().size([W,H]).thresholds(thrs)(grid);
      contourLayer.clearLayers();
      polys.forEach(c=>{ const isMaj=Math.round(c.value)%major===0;
        c.coordinates.forEach(poly=>poly.forEach(ring=>{
          const lls=ring.map(pt=>map.unproject(L.point(tx0*256+pt[0],ty0*256+pt[1]),z));
          contourLayer.addLayer(L.polyline(lls,{color:'#fff6a8',weight:isMaj?2:1,opacity:0.95}));
          if(lls.length>14){ const mid=lls[Math.floor(lls.length/2)]; contourLayer.addLayer(L.marker(mid,{interactive:false,icon:L.divIcon({html:'<span style="color:#fff6a8;background:rgba(40,30,10,.8);padding:0 4px;border-radius:4px;font:800 '+(isMaj?11:10)+'px sans-serif">'+Math.round(c.value)+'</span>',className:'',iconSize:[0,0]})})); }
        }));
      });
      setPoiStatus('');

  [['water','💧'],['nature','🌄'],['heritage','🏛️'],['tour','⛺']].forEach(([g,ic])=>{ const b=document.createElement('button'); b.className='layer-chip active'; b.dataset.grp=g; b.innerHTML='<span class="dot">'+ic+'</span><span data-i18n="grp_'+g+'">'+T('grp_'+g)+'</span>'; b.onclick=()=>{ activeGroups.has(g)?activeGroups.delete(g):activeGroups.add(g); b.classList.toggle('active',activeGroups.has(g)); if(poiOn)loadPois(true); }; layersEl.appendChild(b); });
  addDiv(); addHdr('hdr_profile');
  [['car-fast','🚙'],['trekking','🥾'],['mtb','🚵']].forEach(([p,ic])=>{ const key=p==='car-fast'?'prof_car':p==='trekking'?'prof_hike':'prof_mtb'; const b=document.createElement('button'); b.className='layer-chip'+(routeProfile===p?' active':''); b.dataset.prof=p; b.innerHTML='<span class="dot">'+ic+'</span><span data-i18n="'+key+'">'+T(key)+'</span>'; b.onclick=()=>{ routeProfile=p; document.querySelectorAll('[data-prof]').forEach(x=>x.classList.toggle('active',x.dataset.prof===p)); persist(); if(destPoint){const s=startPoint||[map.getCenter().lng,map.getCenter().lat];routeTo(s,destPoint);} }; layersEl.appendChild(b); });

  setLayer(current);
  applyI18n();
  </script>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
    import { SUPABASE_URL, SUPABASE_KEY } from './supabase-config.js';
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
    const map = window.__map, $ = id=>document.getElementById(id);
    const ICONS={car:'🚗',jeep:'🚙',dog:'🐕',horse:'🐎',camel:'🐪',ibex:'🐐',fox:'🦊',eagle:'🦅'}, ICON_KEYS=Object.keys(ICONS);
    const COLORS=['#4a7c59','#c2682a','#1f6fd1','#d23b3b','#8e44ad','#e2b007','#16a085','#2c2a26'];
    let profile={avatar_color:COLORS[0],avatar_icon:'jeep',display_name:''};
    const modal=$('acctModal'), authView=$('authView'), profView=$('profileView');
    $('accountBtn').onclick=()=>{ modal.classList.add('open'); refresh(); };
    $('acctClose').onclick=()=>modal.classList.remove('open');
    const setMsg=(el,t,ok)=>{el.textContent=t;el.className='msg '+(ok?'ok':'err');};
    function pickers(){ const cc=$('avaColors');cc.innerHTML=''; COLORS.forEach(c=>{const s=document.createElement('span');s.style.background=c;s.className=c===profile.avatar_color?'sel':'';s.onclick=()=>{profile.avatar_color=c;pickers();prev();};cc.appendChild(s);}); const ic=$('avaIcons');ic.innerHTML=''; ICON_KEYS.forEach(k=>{const s=document.createElement('span');s.textContent=ICONS[k];s.className=k===profile.avatar_icon?'sel':'';s.onclick=()=>{profile.avatar_icon=k;pickers();prev();};ic.appendChild(s);}); }
    function prev(){ const b=$('avBig'); b.textContent=ICONS[profile.avatar_icon]||'🚙'; b.style.background=profile.avatar_color; }
    function btnAva(on){ const b=$('accountBtn'); b.textContent=on?(ICONS[profile.avatar_icon]||'🚙'):'👤'; b.style.background=on?profile.avatar_color:''; b.style.color=on?'#fff':''; }
    let myDataLoaded=false;
    async function refresh(){ const {data:{session}}=await supabase.auth.getSession(); window.__loggedIn=!!session;
      if(session){ authView.style.display='none'; profView.style.display='block'; $('profileEmail').textContent=session.user.email;
        const {data}=await supabase.from('profiles').select('*').eq('id',session.user.id).single(); if(data)profile={avatar_color:data.avatar_color||COLORS[0],avatar_icon:data.avatar_icon||'jeep',display_name:data.display_name||''};
        $('dispName').value=profile.display_name||''; pickers(); prev(); btnAva(true);
        if(!myDataLoaded){myDataLoaded=true;loadMyData();}
      } else { authView.style.display='block'; profView.style.display='none'; btnAva(false); } }
    $('loginBtn').onclick=async()=>{ const {error}=await supabase.auth.signInWithPassword({email:$('authEmail').value.trim(),password:$('authPass').value}); if(error)return setMsg($('authMsg'),'שגיאה: '+error.message,false); setMsg($('authMsg'),'התחברת ✓',true); refresh(); };
    $('signupBtn').onclick=async()=>{ const {data,error}=await supabase.auth.signUp({email:$('authEmail').value.trim(),password:$('authPass').value}); if(error)return setMsg($('authMsg'),'שגיאה: '+error.message,false); setMsg($('authMsg'),data.session?'נרשמת! ✓':'נרשמת! אשרו את המייל ואז התחברו.',true); if(data.session)refresh(); };
    $('logoutBtn').onclick=async()=>{ leaveTrip(); await supabase.auth.signOut(); refresh(); };
    $('saveProfileBtn').onclick=async()=>{ const {data:{session}}=await supabase.auth.getSession(); if(!session)return; profile.display_name=$('dispName').value.trim()||'משתמש'; const {error}=await supabase.from('profiles').update({display_name:profile.display_name,avatar_color:profile.avatar_color,avatar_icon:profile.avatar_icon}).eq('id',session.user.id); if(error)return setMsg($('profMsg'),'שגיאה: '+error.message,false); setMsg($('profMsg'),'נשמר ✓',true); btnAva(true); };

    // ---- טיולים ----
    let currentTrip=null, msgCh=null, posCh=null; const memberMarkers={}, memberProfiles={};
    const tripsModal=$('tripsModal');
    $('tripsBtn').onclick=async()=>{ tripsModal.classList.add('open'); await loadTrips(); };
    $('tripsClose').onclick=()=>tripsModal.classList.remove('open');
    async function sess(){ const {data:{session}}=await supabase.auth.getSession(); return session; }
    async function loadTrips(){ const s=await sess(); $('tripsLoginNote').style.display=s?'none':'block'; $('tripsBody').style.display=s?'block':'none'; if(!s)return; const {data}=await supabase.from('trips').select('id,name').order('created_at',{ascending:false}); const list=$('tripsList'); list.innerHTML=''; (data||[]).forEach(t=>{ const row=document.createElement('div'); row.className='trip-row'; row.innerHTML='<span class="nm">'+t.name+'</span>'; const o=document.createElement('button');o.textContent='פתח';o.onclick=()=>{openTrip(t);tripsModal.classList.remove('open');}; const inv=document.createElement('button');inv.className='ghost';inv.textContent='הזמן';inv.onclick=()=>invite(t); row.appendChild(o);row.appendChild(inv); list.appendChild(row); }); if(!data||!data.length)list.innerHTML='<div style="color:var(--muted);font-size:13px">אין טיולים עדיין.</div>'; }
    $('createTripBtn').onclick=async()=>{ const name=$('newTripName').value.trim(); if(!name)return; const s=await sess(); if(!s)return; const {data,error}=await supabase.from('trips').insert({name,owner_id:s.user.id}).select().single(); if(error)return setMsg($('tripsMsg'),'שגיאה: '+error.message,false); $('newTripName').value=''; await loadTrips(); openTrip(data); };
    async function invite(trip){ const s=await sess(); if(!s)return; const {data,error}=await supabase.from('invitations').insert({trip_id:trip.id,inviter_id:s.user.id}).select('token').single(); if(error)return setMsg($('tripsMsg'),'שגיאה: '+error.message,false); const link=location.origin+location.pathname+'?join='+data.token; try{await navigator.clipboard.writeText(link);setMsg($('tripsMsg'),'קישור הועתק ✓',true);}catch(_){prompt('קישור הזמנה:',link);} }
    function openTrip(trip){ currentTrip={id:trip.id,name:trip.name}; $('tbName').textContent='🧭 '+trip.name; $('tripBar').style.display='flex'; $('chatTitle').textContent="צ'אט · "+trip.name; subscribe(); loadMessages(); loadPositions(); }
    function leaveTrip(){ stopLoc(); if(msgCh){supabase.removeChannel(msgCh);msgCh=null;} if(posCh){supabase.removeChannel(posCh);posCh=null;} Object.values(memberMarkers).forEach(m=>map.removeLayer(m)); for(const k in memberMarkers)delete memberMarkers[k]; currentTrip=null; $('tripBar').style.display='none'; $('chatPanel').style.display='none'; }
    $('leaveTripBtn').onclick=leaveTrip;
    $('chatToggleBtn').onclick=()=>{ const p=$('chatPanel'); const show=p.style.display==='none'||!p.style.display; p.style.display=show?'flex':'none'; $('chatToggleBtn').classList.toggle('on',show); };
    $('chatClose').onclick=()=>{ $('chatPanel').style.display='none'; $('chatToggleBtn').classList.remove('on'); };
    $('chatSend').onclick=sendMsg; $('chatText').onkeydown=e=>{if(e.key==='Enter')sendMsg();};
    async function profFor(uid){ if(memberProfiles[uid])return memberProfiles[uid]; const {data}=await supabase.from('profiles').select('display_name,avatar_color,avatar_icon').eq('id',uid).single(); memberProfiles[uid]=data||{display_name:'משתמש',avatar_color:'#888',avatar_icon:'jeep'}; return memberProfiles[uid]; }
    async function renderMsg(m,mine){ const p=await profFor(m.user_id); const el=document.createElement('div'); el.className='chat-msg'+(mine?' mine':''); el.innerHTML='<span class="who">'+p.display_name+'</span>'+m.body.replace(/</g,'&lt;'); const box=$('chatMsgs'); box.appendChild(el); box.scrollTop=box.scrollHeight; }
    async function loadMessages(){ $('chatMsgs').innerHTML=''; if(!currentTrip)return; const s=await sess(); const {data}=await supabase.from('messages').select('*').eq('trip_id',currentTrip.id).order('created_at').limit(100); (data||[]).forEach(m=>renderMsg(m,s&&m.user_id===s.user.id)); }
    async function sendMsg(){ const t=$('chatText').value.trim(); if(!t||!currentTrip)return; const s=await sess(); if(!s)return; $('chatText').value=''; const {error}=await supabase.from('messages').insert({trip_id:currentTrip.id,user_id:s.user.id,body:t}); if(error){$('chatText').value=t;alert('שגיאה: '+error.message);} }
    let locWatch=null;
    $('locShareBtn').onclick=()=>locWatch===null?startLoc():stopLoc();
    function startLoc(){ if(!navigator.geolocation||!currentTrip)return; $('locShareBtn').classList.add('on'); locWatch=navigator.geolocation.watchPosition(async p=>{ const s=await sess(); if(!s)return; await supabase.from('live_positions').upsert({trip_id:currentTrip.id,user_id:s.user.id,lat:p.coords.latitude,lng:p.coords.longitude,updated_at:new Date().toISOString()}); }, e=>{alert('GPS: '+e.message);stopLoc();}, {enableHighAccuracy:true,maximumAge:5000}); }
    function stopLoc(){ if(locWatch!==null){navigator.geolocation.clearWatch(locWatch);locWatch=null;} $('locShareBtn').classList.remove('on'); }
    async function loadPositions(){ if(!currentTrip)return; const {data}=await supabase.from('live_positions').select('*').eq('trip_id',currentTrip.id); (data||[]).forEach(marker); }
    async function marker(row){ if(row.lat==null)return; const s=await sess(); const isMe=s&&row.user_id===s.user.id; const p=await profFor(row.user_id); const icon=ICONS[isMe?profile.avatar_icon:p.avatar_icon]||'🚙'; const color=isMe?profile.avatar_color:p.avatar_color;
      const html='<div class="member-dot" style="background:'+color+'">'+icon+'<span class="nm">'+(isMe?'אני':p.display_name)+'</span></div>';
      const ic=L.divIcon({html:html,className:'',iconSize:[34,34],iconAnchor:[17,17]});
      if(memberMarkers[row.user_id])memberMarkers[row.user_id].setLatLng([row.lat,row.lng]).setIcon(ic); else memberMarkers[row.user_id]=L.marker([row.lat,row.lng],{icon:ic}).addTo(map); }
    function subscribe(){ if(msgCh)supabase.removeChannel(msgCh); if(posCh)supabase.removeChannel(posCh);
      msgCh=supabase.channel('msg:'+currentTrip.id).on('postgres_changes',{event:'INSERT',schema:'public',table:'messages',filter:'trip_id=eq.'+currentTrip.id},async pl=>{const s=await sess();renderMsg(pl.new,s&&pl.new.user_id===s.user.id);}).subscribe();
      posCh=supabase.channel('pos:'+currentTrip.id).on('postgres_changes',{event:'*',schema:'public',table:'live_positions',filter:'trip_id=eq.'+currentTrip.id},pl=>marker(pl.new)).subscribe(); }
    async function handleJoin(){ const token=new URLSearchParams(location.search).get('join'); if(!token)return; const s=await sess(); if(!s){ modal.classList.add('open'); setMsg($('authMsg'),'התחברו כדי להצטרף לטיול',true); const sub=supabase.auth.onAuthStateChange((_e,ss)=>{if(ss){sub.data.subscription.unsubscribe();redeem(token);}}); return; } redeem(token); }
    async function redeem(token){ const {data,error}=await supabase.rpc('redeem_invitation',{p_token:token}); history.replaceState({},'',location.pathname); if(error)return alert('הצטרפות נכשלה: '+error.message); const {data:trip}=await supabase.from('trips').select('id,name').eq('id',data).single(); if(trip){modal.classList.remove('open');openTrip(trip);} }

    // ---- תמונות + מסלולים שמורים ----
    window.uploadPhoto=async function(file,loc,taken){ const s=await sess(); if(!s)return; const path=s.user.id+'/'+Date.now()+'_'+file.name.replace(/[^\w.\-]/g,'_'); const up=await supabase.storage.from('photos').upload(path,file,{contentType:file.type}); if(up.error)return; await supabase.from('photos').insert({user_id:s.user.id,storage_path:path,lng:loc[0],lat:loc[1],taken_at:taken}); };
    window.saveTrack=async function(pts,dist,dur){ const s=await sess(); if(!s)return alert('התחברו כדי לשמור'); const {error}=await supabase.from('tracks').insert({user_id:s.user.id,name:'מסלול '+new Date().toLocaleDateString('he-IL'),points:pts,distance_m:dist,duration_s:dur}); alert(error?'שגיאה: '+error.message:'נשמר לענן ✓'); };
    async function loadMyData(){ const s=await sess(); if(!s)return;
      try{ const {data:tk}=await supabase.from('tracks').select('points').limit(50); (tk||[]).forEach(t=>{ if(Array.isArray(t.points)&&t.points.length>1)L.polyline(t.points.map(p=>[p.lat,p.lng]),{color:'#8e44ad',weight:3,opacity:.6,dashArray:'5,4'}).addTo(map); }); }catch(e){}
      try{ const {data:ph}=await supabase.from('photos').select('storage_path,lat,lng,taken_at').limit(100); for(const p of (ph||[])){ if(p.lat==null)continue; const {data:sg}=await supabase.storage.from('photos').createSignedUrl(p.storage_path,3600); if(sg&&sg.signedUrl&&window.addPhoto)window.addPhoto([p.lng,p.lat],sg.signedUrl,p.taken_at,'שמור'); } }catch(e){} }

    supabase.auth.onAuthStateChange(()=>refresh());
    refresh(); handleJoin();
  </script>
</body>
